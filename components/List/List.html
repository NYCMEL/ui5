<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="List.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">List</h1>
  <p class="demo-desc">Displays a vertically scrollable list of items with icons, descriptions and actions.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Selectable List</div>
  <div class="demo-block">
    <div class="mtk-list mtk-list--selectable" style="max-width:480px">
      <div class="mtk-list__header">Team Members</div>
      <div class="mtk-list__item selected">
        <span class="mtk-list__icon">👩‍💼</span>
        <div class="mtk-list__content"><div class="mtk-list__title">Alice Johnson</div><div class="mtk-list__desc">Product Manager · Berlin</div></div>
        <div class="mtk-list__action"><span class="mtk-tag mtk-tag--positive">Active</span></div>
      </div>
      <div class="mtk-list__item">
        <span class="mtk-list__icon">👨‍💻</span>
        <div class="mtk-list__content"><div class="mtk-list__title">Bob Smith</div><div class="mtk-list__desc">Senior Developer · NYC</div></div>
        <div class="mtk-list__action"><span class="mtk-tag mtk-tag--positive">Active</span></div>
      </div>
      <div class="mtk-list__item">
        <span class="mtk-list__icon">👩‍🎨</span>
        <div class="mtk-list__content"><div class="mtk-list__title">Carol White</div><div class="mtk-list__desc">UX Designer · London</div></div>
        <div class="mtk-list__action"><span class="mtk-tag mtk-tag--neutral">Away</span></div>
      </div>
      <div class="mtk-list__item">
        <span class="mtk-list__icon">👨‍📊</span>
        <div class="mtk-list__content"><div class="mtk-list__title">David Lee</div><div class="mtk-list__desc">Data Analyst · Tokyo</div></div>
        <div class="mtk-list__action"><span class="mtk-tag mtk-tag--set4">Offline</span></div>
      </div>
    </div>
    <div class="text-sm text-muted mt-8 list-state"></div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="List.js"></script>
</body>
</html>
