<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Bar.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Bar</h1>
  <p class="demo-desc">A container primarily used to hold titles, buttons and input elements with start/middle/end slots.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Default Bar</div>
  <div class="demo-block">
    <div class="mtk-bar">
      <div class="mtk-bar__start">
        <button class="mtk-btn mtk-btn--transparent">← Back</button>
      </div>
      <div class="mtk-bar__middle">
        <span class="mtk-bar__title">Page Title</span>
      </div>
      <div class="mtk-bar__end">
        <button class="mtk-btn mtk-btn--transparent">⋯</button>
        <button class="mtk-btn mtk-btn--emphasized">Save</button>
      </div>
    </div>
  </div>
</div>
<div class="demo-section">
  <div class="demo-section__label">Footer Bar</div>
  <div class="demo-block">
    <div class="mtk-bar mtk-bar--footer">
      <div class="mtk-bar__start">
        <button class="mtk-btn mtk-btn--default">Cancel</button>
      </div>
      <div class="mtk-bar__spacer"></div>
      <div class="mtk-bar__end">
        <button class="mtk-btn mtk-btn--default">Back</button>
        <button class="mtk-btn mtk-btn--emphasized">Next →</button>
      </div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Bar.js"></script>
</body>
</html>
