<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Token</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Token.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Token</h1>
  <p class="demo-desc">Small items of information (similar to tags) that visualize previously selected items.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Token Variants</div>
  <div class="demo-block">
    <div class="demo-row">
      <span class="ui5-token">Default Token<button class="ui5-token__remove">×</button></span>
      <span class="ui5-token ui5-token--readonly">Read-only Token</span>
      <span class="ui5-token ui5-token--selected">Selected Token<button class="ui5-token__remove">×</button></span>
      <span class="ui5-token ui5-token--error">Error Token<button class="ui5-token__remove">×</button></span>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="Token.js"></script>
</body>
</html>
