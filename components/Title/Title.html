<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Title</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Title.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Title</h1>
  <p class="demo-desc">Used to display titles inside a page with H1-H6 semantic levels.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Title Levels</div>
  <div class="demo-block" style="display:flex;flex-direction:column;gap:16px">
    <h1 class="ui5-title ui5-title--h1">H1 — Page Title</h1>
    <h2 class="ui5-title ui5-title--h2">H2 — Section Title</h2>
    <h3 class="ui5-title ui5-title--h3">H3 — Sub-Section</h3>
    <h4 class="ui5-title ui5-title--h4">H4 — Group Title</h4>
    <h5 class="ui5-title ui5-title--h5">H5 — Minor Title</h5>
    <h6 class="ui5-title ui5-title--h6">H6 — Label Title</h6>
  </div>
</div>
<div class="demo-section">
  <div class="demo-section__label">With Wrapping</div>
  <div class="demo-block">
    <h2 class="ui5-title ui5-title--h2" style="max-width:300px">Long Title That Wraps Across Multiple Lines Naturally</h2>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="Title.js"></script>
</body>
</html>
