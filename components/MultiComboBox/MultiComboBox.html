<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — MultiComboBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="MultiComboBox.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">MultiComboBox</h1>
  <p class="demo-desc">An input with a dropdown where multiple items can be selected, shown as tokens.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Multi ComboBox</div>
  <div class="demo-block">
    <div class="mtk-input-wrap" style="min-width:320px">
      <label>Skills</label>
      <div class="mtk-mcombo" data-items="JavaScript,TypeScript,React,Vue,Angular,SCSS,Node.js,Python,Java,Go,Rust,SQL">
        <div class="mtk-mcombo__field">
          <div class="mtk-mcombo__tokens" id="mc-tokens"></div>
          <input type="text" class="mtk-mcombo__input" placeholder="Select skills…" id="mc-input" />
          <button class="mtk-mcombo__arrow" id="mc-arrow">▾</button>
        </div>
        <div class="mtk-mcombo__dropdown" id="mc-dropdown"></div>
      </div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="MultiComboBox.js"></script>
</body>
</html>
