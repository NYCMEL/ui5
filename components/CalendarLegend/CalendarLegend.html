<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — CalendarLegend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="CalendarLegend.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">CalendarLegend</h1>
  <p class="demo-desc">A legend that describes the types of days and items in a Calendar.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Legend Items</div>
  <div class="demo-block">
    <div class="ui5-cal-legend">
      <div class="ui5-cal-legend__item"><span class="ui5-cal-legend__dot ui5-cal-legend__dot--today"></span><span>Today</span></div>
      <div class="ui5-cal-legend__item"><span class="ui5-cal-legend__dot ui5-cal-legend__dot--selected"></span><span>Selected</span></div>
      <div class="ui5-cal-legend__item"><span class="ui5-cal-legend__dot ui5-cal-legend__dot--working"></span><span>Working Day</span></div>
      <div class="ui5-cal-legend__item"><span class="ui5-cal-legend__dot ui5-cal-legend__dot--non-working"></span><span>Non-Working Day</span></div>
      <div class="ui5-cal-legend__item"><span class="ui5-cal-legend__dot ui5-cal-legend__dot--holiday"></span><span>Holiday</span></div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="CalendarLegend.js"></script>
</body>
</html>
