<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — AIInput</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../shared/_base.css" />
  <link rel="stylesheet" href="AIInput.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">AIInput</h1>
  <p class="demo-desc">An AI-enhanced text input with sparkle decoration, suggestion chips and AI-generated hints.</p>
  
<div class="demo-section">
  <div class="demo-section__label">AI Input</div>
  <div class="demo-block">
    <div class="mtk-ai-input-wrap">
      <label class="mtk-ai-label">✨ AI-Enhanced Input</label>
      <div class="mtk-ai-input">
        <span class="mtk-ai-input__icon">✨</span>
        <input type="text" placeholder="Ask AI or enter value…" id="ai-input-field" />
        <button class="mtk-ai-input__btn" id="ai-input-trigger">Generate</button>
      </div>
      <div class="mtk-ai-suggestions" id="ai-suggestions">
        <span class="mtk-ai-chip" data-val="Summarize this">Summarize</span>
        <span class="mtk-ai-chip" data-val="Translate to German">Translate</span>
        <span class="mtk-ai-chip" data-val="Improve my writing">Improve</span>
        <span class="mtk-ai-chip" data-val="Make it formal">Formalize</span>
      </div>
    </div>
  </div>
</div>
</div>
<script src="../../../shared/base.js"></script>
<script src="AIInput.js"></script>
</body>
</html>
