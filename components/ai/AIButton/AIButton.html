<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — AIButton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../shared/_base.css" />
  <link rel="stylesheet" href="AIButton.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">AIButton</h1>
  <p class="demo-desc">An AI-enhanced button with a pulsing glow and animated state for triggering AI actions.</p>
  
<div class="demo-section">
  <div class="demo-section__label">AI Button Variants</div>
  <div class="demo-block">
    <div class="demo-row">
      <button class="mtk-ai-btn">✨ Generate</button>
      <button class="mtk-ai-btn mtk-ai-btn--loading">⏳ Generating…</button>
      <button class="mtk-ai-btn mtk-ai-btn--complete">✓ Complete</button>
      <button class="mtk-ai-btn" disabled>✨ Disabled</button>
    </div>
  </div>
</div>
</div>
<script src="../../../shared/base.js"></script>
<script src="AIButton.js"></script>
</body>
</html>
