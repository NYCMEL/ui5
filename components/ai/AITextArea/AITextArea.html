<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — AITextArea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../shared/_base.css" />
  <link rel="stylesheet" href="AITextArea.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">AITextArea</h1>
  <p class="demo-desc">A textarea enhanced with AI writing assistance — rewrite, improve, and expand actions.</p>
  
<div class="demo-section">
  <div class="demo-section__label">AI TextArea</div>
  <div class="demo-block">
    <div class="ui5-aitextarea-wrap">
      <div class="ui5-aitextarea">
        <textarea class="ui5-aitextarea__field" id="aitextarea" placeholder="Start typing…" rows="5">This is a sample text that can be enhanced with AI writing assistance. Select an action below to transform the content.</textarea>
        <div class="ui5-aitextarea__toolbar">
          <span style="font-size:12px;color:#6c2483;font-weight:600">✨ AI Actions</span>
          <div style="display:flex;gap:6px">
            <button class="ui5-aitextarea__action" data-action="improve">🪄 Improve</button>
            <button class="ui5-aitextarea__action" data-action="formal">👔 Formalize</button>
            <button class="ui5-aitextarea__action" data-action="shorter">✂️ Shorten</button>
            <button class="ui5-aitextarea__action" data-action="expand">📝 Expand</button>
          </div>
        </div>
      </div>
      <div class="ui5-aitextarea__status" id="aitextarea-status"></div>
    </div>
  </div>
</div>
</div>
<script src="../../../shared/base.js"></script>
<script src="AITextArea.js"></script>
</body>
</html>
