<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — ProgressIndicator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="ProgressIndicator.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">ProgressIndicator</h1>
  <p class="demo-desc">Shows the progress of a process in a graphical way with value and status states.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Progress States</div>
  <div class="demo-block" style="display:flex;flex-direction:column;gap:20px;max-width:400px">
    <div class="mtk-progress"><div class="mtk-progress__labels"><span>Default — 65%</span></div><div class="mtk-progress__bar"><div class="mtk-progress__fill" style="width:65%"></div></div></div>
    <div class="mtk-progress"><div class="mtk-progress__labels"><span>Success — 100%</span></div><div class="mtk-progress__bar"><div class="mtk-progress__fill mtk-progress__fill--success" style="width:100%"></div></div></div>
    <div class="mtk-progress"><div class="mtk-progress__labels"><span>Warning — 40%</span></div><div class="mtk-progress__bar"><div class="mtk-progress__fill mtk-progress__fill--warning" style="width:40%"></div></div></div>
    <div class="mtk-progress"><div class="mtk-progress__labels"><span>Error — 20%</span></div><div class="mtk-progress__bar"><div class="mtk-progress__fill mtk-progress__fill--error" style="width:20%"></div></div></div>
    <div>
      <div class="text-sm text-muted" style="margin-bottom:8px">Animated (click to reset)</div>
      <div class="mtk-progress" id="animated-progress">
        <div class="mtk-progress__labels"><span id="prog-label">0%</span></div>
        <div class="mtk-progress__bar"><div class="mtk-progress__fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <button class="mtk-btn mtk-btn--emphasized mt-8" id="run-progress" style="margin-top:10px">Run Progress</button>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="ProgressIndicator.js"></script>
</body>
</html>
