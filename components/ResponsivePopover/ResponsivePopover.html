<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — ResponsivePopover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="ResponsivePopover.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">ResponsivePopover</h1>
  <p class="demo-desc">Acts as a Popover on desktop/tablet and as a Dialog on phone screens.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Responsive Popover</div>
  <div class="demo-block">
    <div class="demo-row">
      <div class="ui5-rpopover-wrap">
        <button class="ui5-btn ui5-btn--default" id="open-rpop">Open Popover</button>
        <div class="ui5-rpopover" id="rpop">
          <div class="ui5-rpopover__header">
            <strong>User Details</strong>
            <button class="ui5-rpopover__close" id="close-rpop">×</button>
          </div>
          <div class="ui5-rpopover__body">
            <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
              <div class="ui5-avatar ui5-avatar--md ui5-avatar--accent-1">JD</div>
              <div><div style="font-weight:600">Jane Doe</div><div class="text-sm text-muted">Product Manager</div></div>
            </div>
            <p class="text-sm" style="color:#3d4148">Based in Berlin. Available Mon–Fri 9–18 CET.</p>
          </div>
          <div class="ui5-rpopover__footer">
            <button class="ui5-btn ui5-btn--transparent ui5-btn--sm" id="close-rpop2">Close</button>
            <button class="ui5-btn ui5-btn--emphasized ui5-btn--sm">Contact</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="ResponsivePopover.js"></script>
</body>
</html>
