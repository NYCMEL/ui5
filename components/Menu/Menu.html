<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Menu.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Menu</h1>
  <p class="demo-desc">A context menu component with items and optional sub-menus.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Menu Examples</div>
  <div class="demo-block">
    <div class="demo-row">
      <div class="mtk-menu-wrap">
        <button class="mtk-btn mtk-btn--default" data-menu-toggle="menu-file">📄 File ▾</button>
        <div class="mtk-menu" id="menu-file">
          <div class="mtk-menu__item">📄 New File</div>
          <div class="mtk-menu__item">📂 Open…</div>
          <div class="mtk-menu__item">💾 Save</div>
          <div class="mtk-menu__item mtk-menu__item--sep"></div>
          <div class="mtk-menu__item">📤 Export</div>
          <div class="mtk-menu__item mtk-menu__item--disabled">🖨️ Print (disabled)</div>
        </div>
      </div>
      <div class="mtk-menu-wrap">
        <button class="mtk-btn mtk-btn--default" data-menu-toggle="menu-edit">✏️ Edit ▾</button>
        <div class="mtk-menu" id="menu-edit">
          <div class="mtk-menu__item">↩ Undo</div>
          <div class="mtk-menu__item">↪ Redo</div>
          <div class="mtk-menu__item mtk-menu__item--sep"></div>
          <div class="mtk-menu__item">✂️ Cut</div>
          <div class="mtk-menu__item">📋 Copy</div>
          <div class="mtk-menu__item">📌 Paste</div>
        </div>
      </div>
    </div>
    <div class="text-sm text-muted mt-8 menu-state"></div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Menu.js"></script>
</body>
</html>
