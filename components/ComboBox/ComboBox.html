<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — ComboBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="ComboBox.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">ComboBox</h1>
  <p class="demo-desc">An input field with a dropdown list of suggestions. Users can type to filter or select from the list.</p>
  
<div class="demo-section">
  <div class="demo-section__label">ComboBox</div>
  <div class="demo-block">
    <div class="demo-row" style="flex-wrap:wrap;gap:20px">
      <div class="mtk-input-wrap" style="min-width:220px">
        <label>Country</label>
        <div class="mtk-combo" data-items="Germany,France,Spain,Italy,United States,Japan,Brazil,Australia,Canada,Netherlands">
          <input type="text" class="mtk-combo__input mtk-input" placeholder="Select or type…" />
          <button class="mtk-combo__arrow">▾</button>
          <div class="mtk-combo__dropdown"></div>
        </div>
      </div>
      <div class="mtk-input-wrap" style="min-width:220px">
        <label>Timezone</label>
        <div class="mtk-combo" data-items="UTC,UTC+1,UTC+2,UTC+3,UTC+5:30,UTC+8,UTC+9,UTC-5,UTC-6,UTC-8">
          <input type="text" class="mtk-combo__input mtk-input" placeholder="Select timezone…" />
          <button class="mtk-combo__arrow">▾</button>
          <div class="mtk-combo__dropdown"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="ComboBox.js"></script>
</body>
</html>
