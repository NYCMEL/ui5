<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — MultiInput</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="MultiInput.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">MultiInput</h1>
  <p class="demo-desc">Allows the user to enter multiple values displayed as tokens. Press Enter to add, Backspace to remove.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Token Input</div>
  <div class="demo-block">
    <div class="mtk-input-wrap" style="max-width:480px">
      <label>Tags — press Enter to add</label>
      <div class="mtk-multi-input">
        <span class="mtk-token">Design<button class="mtk-token__remove">×</button></span>
        <span class="mtk-token">Frontend<button class="mtk-token__remove">×</button></span>
        <input type="text" placeholder="Type and press Enter…" />
      </div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="MultiInput.js"></script>
</body>
</html>
