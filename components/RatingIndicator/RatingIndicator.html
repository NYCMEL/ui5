<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — RatingIndicator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="RatingIndicator.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">RatingIndicator</h1>
  <p class="demo-desc">Used to display a specific number of icons to rate an item. Supports interactive and read-only modes.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Interactive Rating</div>
  <div class="demo-block">
    <div class="ui5-rating" data-value="3">
      <span class="ui5-rating__star">★</span><span class="ui5-rating__star">★</span>
      <span class="ui5-rating__star">★</span><span class="ui5-rating__star">★</span>
      <span class="ui5-rating__star">★</span>
    </div>
    <div class="text-sm text-muted mt-8 rating-state">Rating: 3 / 5</div>
  </div>
</div>
<div class="demo-section">
  <div class="demo-section__label">Read-only</div>
  <div class="demo-block">
    <div class="ui5-rating ui5-rating--readonly" data-value="4">
      <span class="ui5-rating__star filled">★</span><span class="ui5-rating__star filled">★</span>
      <span class="ui5-rating__star filled">★</span><span class="ui5-rating__star filled">★</span>
      <span class="ui5-rating__star">★</span>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="RatingIndicator.js"></script>
</body>
</html>
