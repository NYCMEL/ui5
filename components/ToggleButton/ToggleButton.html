<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — ToggleButton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="ToggleButton.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">ToggleButton</h1>
  <p class="demo-desc">An enhanced button that preserves a pressed/unpressed state.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Toggle Buttons</div>
  <div class="demo-block">
    <div class="demo-row">
      <button class="mtk-btn mtk-btn--emphasized mtk-toggle-btn active">📌 Pinned</button>
      <button class="mtk-btn mtk-btn--default mtk-toggle-btn">🔕 Mute</button>
      <button class="mtk-btn mtk-btn--default mtk-toggle-btn">⭐ Favorite</button>
      <button class="mtk-btn mtk-btn--default mtk-toggle-btn">🔒 Lock</button>
    </div>
    <div class="text-sm text-muted mt-8 toggle-state">Pinned is active</div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="ToggleButton.js"></script>
</body>
</html>
