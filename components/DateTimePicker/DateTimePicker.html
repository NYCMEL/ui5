<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — DateTimePicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="DateTimePicker.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">DateTimePicker</h1>
  <p class="demo-desc">Allows users to select both date and time in a single input field.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Date & Time</div>
  <div class="demo-block">
    <div class="demo-row" style="flex-wrap:wrap;gap:20px">
      <div class="ui5-input-wrap"><label>Meeting Time</label><input type="datetime-local" class="ui5-date-field ui5-date-field--full" /></div>
      <div class="ui5-input-wrap"><label>Deadline</label><input type="datetime-local" class="ui5-date-field ui5-date-field--full" /></div>
      <div class="ui5-input-wrap"><label>Disabled</label><input type="datetime-local" class="ui5-date-field ui5-date-field--full" disabled /></div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="DateTimePicker.js"></script>
</body>
</html>
