<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — StepInput</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="StepInput.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">StepInput</h1>
  <p class="demo-desc">Input field with increment/decrement buttons for numerical values.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Step Inputs</div>
  <div class="demo-block">
    <div class="demo-row" style="flex-wrap:wrap;gap:24px">
      <div><div class="text-sm text-muted" style="margin-bottom:6px">Quantity</div>
        <div class="mtk-step-input"><button class="step-down">−</button><input type="number" value="5" min="0" max="100" step="1" /><button class="step-up">+</button></div></div>
      <div><div class="text-sm text-muted" style="margin-bottom:6px">Temperature (°C)</div>
        <div class="mtk-step-input"><button class="step-down">−</button><input type="number" value="21" min="-10" max="40" step="0.5" /><button class="step-up">+</button></div></div>
      <div><div class="text-sm text-muted" style="margin-bottom:6px">Disabled</div>
        <div class="mtk-step-input"><button class="step-down" disabled>−</button><input type="number" value="10" disabled /><button class="step-up" disabled>+</button></div></div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="StepInput.js"></script>
</body>
</html>
