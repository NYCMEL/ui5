<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Icon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Icon.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Icon</h1>
  <p class="demo-desc">Represents an SVG icon that can be used throughout the UI.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Icon Gallery</div>
  <div class="demo-block">
    <div class="ui5-icon-gallery">
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">🏠</span><span class="ui5-icon-item__name">home</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">⚙️</span><span class="ui5-icon-item__name">settings</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">🔔</span><span class="ui5-icon-item__name">bell</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">👤</span><span class="ui5-icon-item__name">person</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">📁</span><span class="ui5-icon-item__name">folder</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">🔍</span><span class="ui5-icon-item__name">search</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">✏️</span><span class="ui5-icon-item__name">edit</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">🗑️</span><span class="ui5-icon-item__name">delete</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">⬇️</span><span class="ui5-icon-item__name">download</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">⬆️</span><span class="ui5-icon-item__name">upload</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">📊</span><span class="ui5-icon-item__name">chart</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">📅</span><span class="ui5-icon-item__name">calendar</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">📧</span><span class="ui5-icon-item__name">mail</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">💬</span><span class="ui5-icon-item__name">message</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">🔗</span><span class="ui5-icon-item__name">link</span></div>
      <div class="ui5-icon-item"><span class="ui5-icon-item__glyph">⭐</span><span class="ui5-icon-item__name">favorite</span></div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Icon.js"></script>
</body>
</html>
