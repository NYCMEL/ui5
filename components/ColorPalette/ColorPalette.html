<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — ColorPalette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="ColorPalette.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">ColorPalette</h1>
  <p class="demo-desc">Represents a predefined range of colors for easier user selection.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Default Palette</div>
  <div class="demo-block">
    <div class="ui5-color-palette">
      <div class="ui5-color-palette__swatch" style="background:#0a6ed1"></div>
      <div class="ui5-color-palette__swatch" style="background:#107e3e"></div>
      <div class="ui5-color-palette__swatch" style="background:#b00"></div>
      <div class="ui5-color-palette__swatch" style="background:#e9730c"></div>
      <div class="ui5-color-palette__swatch" style="background:#faad14"></div>
      <div class="ui5-color-palette__swatch" style="background:#6c2483"></div>
      <div class="ui5-color-palette__swatch" style="background:#e8908c"></div>
      <div class="ui5-color-palette__swatch" style="background:#1a1d23"></div>
      <div class="ui5-color-palette__swatch" style="background:#c5c8cd"></div>
      <div class="ui5-color-palette__swatch" style="background:#36a2eb"></div>
      <div class="ui5-color-palette__swatch" style="background:#4bc0c0"></div>
      <div class="ui5-color-palette__swatch" style="background:#ff6384"></div>
    </div>
    <div class="text-sm text-muted mt-8 color-state">Click a color to select it</div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="ColorPalette.js"></script>
</body>
</html>
