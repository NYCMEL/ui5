<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Link.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Link</h1>
  <p class="demo-desc">A hyperlink component for navigation within and outside the application.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Link Types</div>
  <div class="demo-block">
    <div class="demo-row">
      <a href="#" class="ui5-link">Default Link</a>
      <a href="#" class="ui5-link ui5-link--subtle">Subtle Link</a>
      <a href="#" class="ui5-link ui5-link--visited">Visited Link</a>
      <a href="#" class="ui5-link" target="_blank">External Link ↗</a>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Link.js"></script>
</body>
</html>
