<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — ColorPalettePopover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="ColorPalettePopover.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">ColorPalettePopover</h1>
  <p class="demo-desc">A popover containing a ColorPalette for color selection.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Color Palette Popover</div>
  <div class="demo-block">
    <div class="mtk-cpopover-wrap">
      <button class="mtk-btn mtk-btn--default" id="open-cpop">
        <span id="cpop-swatch" style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#0a6ed1;border:1px solid rgba(0,0,0,.15);vertical-align:middle"></span>
        Choose Color ▾
      </button>
      <div class="mtk-cpopover" id="cpop">
        <div class="mtk-cpopover__header">Select Color</div>
        <div class="mtk-color-palette">
          <div class="mtk-color-palette__swatch" style="background:#0a6ed1"></div>
          <div class="mtk-color-palette__swatch" style="background:#107e3e"></div>
          <div class="mtk-color-palette__swatch" style="background:#b00"></div>
          <div class="mtk-color-palette__swatch" style="background:#e9730c"></div>
          <div class="mtk-color-palette__swatch" style="background:#faad14"></div>
          <div class="mtk-color-palette__swatch" style="background:#6c2483"></div>
          <div class="mtk-color-palette__swatch" style="background:#e8908c"></div>
          <div class="mtk-color-palette__swatch" style="background:#1a1d23"></div>
          <div class="mtk-color-palette__swatch" style="background:#c5c8cd"></div>
          <div class="mtk-color-palette__swatch" style="background:#36a2eb"></div>
          <div class="mtk-color-palette__swatch" style="background:#4bc0c0"></div>
          <div class="mtk-color-palette__swatch" style="background:#ff6384"></div>
        </div>
        <div class="mtk-cpopover__footer">
          <button class="mtk-btn mtk-btn--transparent mtk-btn--sm" id="cpop-more">More Colors…</button>
        </div>
      </div>
    </div>
    <div class="text-sm text-muted mt-8" id="cpop-state">Selected: #0a6ed1</div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="ColorPalettePopover.js"></script>
</body>
</html>
