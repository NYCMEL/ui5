<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — AvatarGroup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="AvatarGroup.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">AvatarGroup</h1>
  <p class="demo-desc">Displays a group of avatars arranged horizontally with overflow handling.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Stacked Group</div>
  <div class="demo-block">
    <div class="mtk-avatar-group">
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--accent-1">JD</div>
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--accent-2">AB</div>
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--accent-3">CD</div>
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--accent-4">EF</div>
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--accent-5 mtk-avatar-group__overflow">+3</div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="AvatarGroup.js"></script>
</body>
</html>
