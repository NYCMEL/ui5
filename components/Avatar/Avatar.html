<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — Avatar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Avatar.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Avatar</h1>
  <p class="demo-desc">Displays a profile image, initials, or an icon as a circular or square element.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Sizes</div>
  <div class="demo-block">
    <div class="demo-row">
      <div class="mtk-avatar mtk-avatar--xs mtk-avatar--accent-1">JD</div>
      <div class="mtk-avatar mtk-avatar--sm mtk-avatar--accent-2">AB</div>
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--accent-3">CD</div>
      <div class="mtk-avatar mtk-avatar--lg mtk-avatar--accent-4">EF</div>
      <div class="mtk-avatar mtk-avatar--xl mtk-avatar--accent-5">GH</div>
    </div>
  </div>
</div>
<div class="demo-section">
  <div class="demo-section__label">Shapes & Types</div>
  <div class="demo-block">
    <div class="demo-row">
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--square mtk-avatar--accent-1">JD</div>
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--square mtk-avatar--accent-6">🏢</div>
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--accent-2"><img src="https://i.pravatar.cc/64?img=3" alt="User" /></div>
      <div class="mtk-avatar mtk-avatar--md mtk-avatar--accent-5">👤</div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Avatar.js"></script>
</body>
</html>
