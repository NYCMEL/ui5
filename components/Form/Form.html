<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Form.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Form</h1>
  <p class="demo-desc">A form control for structuring labeled inputs in a responsive column layout.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Two Column Form</div>
  <div class="demo-block">
    <div class="ui5-form">
      <div class="ui5-form__group">Personal Information</div>
      <div class="ui5-form__field"><label class="ui5-label ui5-label--required">First Name</label><input type="text" class="ui5-input" placeholder="Enter first name" /></div>
      <div class="ui5-form__field"><label class="ui5-label ui5-label--required">Last Name</label><input type="text" class="ui5-input" placeholder="Enter last name" /></div>
      <div class="ui5-form__field"><label class="ui5-label">Email</label><input type="email" class="ui5-input" placeholder="email@example.com" /></div>
      <div class="ui5-form__field"><label class="ui5-label">Phone</label><input type="tel" class="ui5-input" placeholder="+1 (000) 000-0000" /></div>
      <div class="ui5-form__group">Address</div>
      <div class="ui5-form__field"><label class="ui5-label">City</label><input type="text" class="ui5-input" placeholder="City" /></div>
      <div class="ui5-form__field"><label class="ui5-label">Country</label>
        <select class="ui5-select"><option>Select country…</option><option>United States</option><option>Germany</option><option>France</option></select>
      </div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Form.js"></script>
</body>
</html>
