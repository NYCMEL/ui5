<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — TimePicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="TimePicker.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">TimePicker</h1>
  <p class="demo-desc">Provides an input field for time selection.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Time Inputs</div>
  <div class="demo-block">
    <div class="demo-row" style="flex-wrap:wrap;gap:20px">
      <div class="ui5-input-wrap"><label>Time (HH:MM)</label><input type="time" class="ui5-time-field" value="09:30" /></div>
      <div class="ui5-input-wrap"><label>Time with Seconds</label><input type="time" step="1" class="ui5-time-field" value="14:45:00" /></div>
      <div class="ui5-input-wrap"><label>Disabled</label><input type="time" class="ui5-time-field" value="12:00" disabled /></div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="TimePicker.js"></script>
</body>
</html>
