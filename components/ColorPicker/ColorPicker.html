<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — ColorPicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="ColorPicker.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">ColorPicker</h1>
  <p class="demo-desc">Allows users to choose any color using a hue/saturation picker with hex and RGB inputs.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Color Picker</div>
  <div class="demo-block">
    <div class="mtk-color-picker">
      <div class="mtk-color-picker__canvas" id="cp-canvas">
        <div class="mtk-color-picker__handle" id="cp-handle"></div>
      </div>
      <div class="mtk-color-picker__hue">
        <input type="range" class="mtk-color-picker__hue-slider" id="cp-hue" min="0" max="360" value="217" />
      </div>
      <div class="mtk-color-picker__inputs">
        <div class="mtk-input-wrap" style="min-width:90px"><label>Hex</label><input type="text" class="mtk-input" id="cp-hex" value="#0a6ed1" maxlength="7" /></div>
        <div class="mtk-input-wrap" style="min-width:60px"><label>R</label><input type="number" class="mtk-input" id="cp-r" min="0" max="255" value="10" /></div>
        <div class="mtk-input-wrap" style="min-width:60px"><label>G</label><input type="number" class="mtk-input" id="cp-g" min="0" max="255" value="110" /></div>
        <div class="mtk-input-wrap" style="min-width:60px"><label>B</label><input type="number" class="mtk-input" id="cp-b" min="0" max="255" value="209" /></div>
      </div>
      <div class="mtk-color-picker__preview">
        <span class="mtk-color-picker__preview-box" id="cp-preview"></span>
        <span class="text-sm text-muted" id="cp-label">#0a6ed1</span>
      </div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="ColorPicker.js"></script>
</body>
</html>
