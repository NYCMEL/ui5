<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Card.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Card</h1>
  <p class="demo-desc">A container for content with header, body and footer slots.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Cards</div>
  <div class="demo-block">
    <div class="grid-3">
      <div class="ui5-card">
        <div class="ui5-card__header">
          <div><div class="ui5-card__title">Sales Report</div><div class="ui5-card__subtitle">Q4 2025</div></div>
        </div>
        <div class="ui5-card__body">
          <div style="font-size:28px;font-weight:700;color:#0a6ed1">$2.4M</div>
          <div class="text-sm text-muted">↑ 12% vs last quarter</div>
        </div>
        <div class="ui5-card__footer">
          <button class="ui5-btn ui5-btn--transparent ui5-btn--sm">View Details</button>
        </div>
      </div>
      <div class="ui5-card">
        <div class="ui5-card__header">
          <div><div class="ui5-card__title">Active Users</div><div class="ui5-card__subtitle">Last 30 days</div></div>
        </div>
        <div class="ui5-card__body">
          <div style="font-size:28px;font-weight:700;color:#107e3e">14,382</div>
          <div class="text-sm text-muted">↑ 8% growth</div>
        </div>
        <div class="ui5-card__footer">
          <button class="ui5-btn ui5-btn--transparent ui5-btn--sm">Analytics</button>
        </div>
      </div>
      <div class="ui5-card">
        <div class="ui5-card__header">
          <div><div class="ui5-card__title">Open Issues</div><div class="ui5-card__subtitle">Requires attention</div></div>
        </div>
        <div class="ui5-card__body">
          <div style="font-size:28px;font-weight:700;color:#b00">7</div>
          <div class="text-sm text-muted">3 critical, 4 minor</div>
        </div>
        <div class="ui5-card__footer">
          <button class="ui5-btn ui5-btn--negative ui5-btn--sm">Resolve</button>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Card.js"></script>
</body>
</html>
