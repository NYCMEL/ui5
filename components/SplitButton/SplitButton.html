<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — SplitButton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="SplitButton.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">SplitButton</h1>
  <p class="demo-desc">Combines a primary action with a dropdown arrow for additional options.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Split Button Variants</div>
  <div class="demo-block">
    <div class="demo-row" style="align-items:flex-start">
      <div>
        <div class="mtk-split-btn">
          <button class="mtk-btn mtk-btn--emphasized split-main">💾 Save</button>
          <button class="mtk-btn mtk-btn--emphasized split-arrow" data-menu-toggle="menu-save">▾</button>
        </div>
        <div class="mtk-menu" id="menu-save">
          <div class="mtk-menu__item">💾 Save as Draft</div>
          <div class="mtk-menu__item">📤 Save &amp; Submit</div>
          <div class="mtk-menu__item">📋 Save as Template</div>
        </div>
      </div>
      <div>
        <div class="mtk-split-btn">
          <button class="mtk-btn mtk-btn--default split-main">➕ Create</button>
          <button class="mtk-btn mtk-btn--default split-arrow" data-menu-toggle="menu-create">▾</button>
        </div>
        <div class="mtk-menu" id="menu-create">
          <div class="mtk-menu__item">📄 New Document</div>
          <div class="mtk-menu__item">📊 New Report</div>
        </div>
      </div>
    </div>
    <div class="text-sm text-muted mt-8 split-state"></div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="SplitButton.js"></script>
</body>
</html>
