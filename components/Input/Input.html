<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Input.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Input</h1>
  <p class="demo-desc">An input component for text entry with various states and value help.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Input States</div>
  <div class="demo-block">
    <div class="demo-row" style="flex-wrap:wrap;gap:20px">
      <div class="ui5-input-wrap">
        <label>Default</label>
        <div class="ui5-input-icon-wrap"><input type="text" class="ui5-input" placeholder="Enter value…" /><span class="input-icon">✏️</span></div>
      </div>
      <div class="ui5-input-wrap">
        <label>Success</label>
        <input type="text" class="ui5-input ui5-input--success" value="Valid entry" />
        <span class="ui5-input-msg ui5-input-msg--success">✓ Looks great!</span>
      </div>
      <div class="ui5-input-wrap">
        <label>Warning</label>
        <input type="text" class="ui5-input ui5-input--warning" value="Suspicious" />
        <span class="ui5-input-msg ui5-input-msg--warning">⚠ Please review</span>
      </div>
      <div class="ui5-input-wrap">
        <label>Error</label>
        <input type="text" class="ui5-input ui5-input--error" value="Invalid" />
        <span class="ui5-input-msg ui5-input-msg--error">✕ Required field</span>
      </div>
      <div class="ui5-input-wrap">
        <label>Disabled</label>
        <input type="text" class="ui5-input" value="Disabled value" disabled />
      </div>
      <div class="ui5-input-wrap">
        <label>Password</label>
        <input type="password" class="ui5-input" placeholder="Enter password" />
      </div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Input.js"></script>
</body>
</html>
