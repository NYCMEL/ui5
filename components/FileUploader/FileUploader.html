<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — FileUploader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="FileUploader.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">FileUploader</h1>
  <p class="demo-desc">Opens a file explorer dialog and enables users to upload files via click or drag & drop.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Drop Zone</div>
  <div class="demo-block">
    <div class="ui5-file-uploader">
      <input type="file" multiple />
      <div class="ui5-file-uploader__drop">
        <span class="drop-icon">📂</span>
        <span class="drop-text">Click or drag &amp; drop files here</span>
        <span class="drop-hint">All file types accepted</span>
      </div>
    </div>
    <div class="text-sm text-muted mt-8 file-state"></div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="FileUploader.js"></script>
</body>
</html>
