<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — RangeSlider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="RangeSlider.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">RangeSlider</h1>
  <p class="demo-desc">Represents a numerical interval with two handles to select a sub-range.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Range Slider</div>
  <div class="demo-block" style="display:flex;flex-direction:column;gap:28px;max-width:400px">
    <div class="ui5-range-slider-wrap">
      <label class="text-sm fw-600">Price Range ($)</label>
      <div class="ui5-range-slider" data-min="0" data-max="1000" data-start="200" data-end="750">
        <div class="ui5-range-slider__track"><div class="ui5-range-slider__fill"></div></div>
        <input type="range" class="ui5-range-slider__input ui5-range-slider__input--start" />
        <input type="range" class="ui5-range-slider__input ui5-range-slider__input--end" />
      </div>
      <div class="ui5-range-slider__labels"><span class="rs-start">$200</span><span class="rs-end">$750</span></div>
    </div>
    <div class="ui5-range-slider-wrap">
      <label class="text-sm fw-600">Age Range</label>
      <div class="ui5-range-slider" data-min="18" data-max="65" data-start="25" data-end="45">
        <div class="ui5-range-slider__track"><div class="ui5-range-slider__fill"></div></div>
        <input type="range" class="ui5-range-slider__input ui5-range-slider__input--start" />
        <input type="range" class="ui5-range-slider__input ui5-range-slider__input--end" />
      </div>
      <div class="ui5-range-slider__labels"><span class="rs-start">25</span><span class="rs-end">45</span></div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="RangeSlider.js"></script>
</body>
</html>
