<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Select</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Select.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Select</h1>
  <p class="demo-desc">Enables users to select an option from a predefined list.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Select Variants</div>
  <div class="demo-block">
    <div class="demo-row" style="flex-wrap:wrap;gap:20px">
      <div class="ui5-input-wrap"><label>Priority</label>
        <select class="ui5-select"><option value="">Select…</option><option>🔴 High</option><option>🟡 Medium</option><option>🟢 Low</option></select></div>
      <div class="ui5-input-wrap"><label>Status</label>
        <select class="ui5-select"><option>Draft</option><option>In Progress</option><option selected>Under Review</option><option>Done</option></select></div>
      <div class="ui5-input-wrap"><label>Disabled</label>
        <select class="ui5-select" disabled><option>Not available</option></select></div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Select.js"></script>
</body>
</html>
