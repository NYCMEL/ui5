<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — UserMenu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="UserMenu.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">UserMenu</h1>
  <p class="demo-desc">A popover menu for user account options: profile, settings, and sign out.</p>
  
<div class="demo-section">
  <div class="demo-section__label">User Menu</div>
  <div class="demo-block">
    <div class="mtk-usermenu-wrap">
      <button class="mtk-usermenu-trigger" id="open-usermenu">
        <div class="mtk-avatar mtk-avatar--sm mtk-avatar--accent-1">JD</div>
        <div class="mtk-usermenu-trigger__info">
          <div class="mtk-usermenu-trigger__name">Jane Doe</div>
          <div class="mtk-usermenu-trigger__role">Product Manager</div>
        </div>
        <span>▾</span>
      </button>
      <div class="mtk-usermenu" id="usermenu">
        <div class="mtk-usermenu__header">
          <div class="mtk-avatar mtk-avatar--lg mtk-avatar--accent-1">JD</div>
          <div><div class="mtk-usermenu__name">Jane Doe</div><div class="mtk-usermenu__email">jane.doe@company.com</div><div class="mtk-usermenu__role">Product Manager · Berlin</div></div>
        </div>
        <div class="mtk-usermenu__items">
          <div class="mtk-usermenu__item">👤 My Profile</div>
          <div class="mtk-usermenu__item">⚙️ Preferences</div>
          <div class="mtk-usermenu__item">🔔 Notifications</div>
          <div class="mtk-usermenu__sep"></div>
          <div class="mtk-usermenu__item mtk-usermenu__item--signout">🚪 Sign Out</div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="UserMenu.js"></script>
</body>
</html>
