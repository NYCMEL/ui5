<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Search.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Search</h1>
  <p class="demo-desc">A Fiori-styled search field with category filter and suggestions dropdown.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Search with Suggestions</div>
  <div class="demo-block">
    <div class="ui5-search-wrap">
      <div class="ui5-search">
        <span class="ui5-search__icon">🔍</span>
        <input type="text" class="ui5-search__input" placeholder="Search…" id="search-input" />
        <button class="ui5-search__clear" id="search-clear" style="display:none">×</button>
        <button class="ui5-search__btn">Search</button>
      </div>
      <div class="ui5-search__suggestions" id="search-suggestions"></div>
    </div>
    <div class="text-sm text-muted mt-8" id="search-state"></div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="Search.js"></script>
</body>
</html>
