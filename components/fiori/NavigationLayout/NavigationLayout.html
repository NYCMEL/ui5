<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — NavigationLayout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="NavigationLayout.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">NavigationLayout</h1>
  <p class="demo-desc">A full-page layout combining ShellBar and SideNavigation for enterprise application shells.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Navigation Layout</div>
  <div class="demo-block" style="padding:0;overflow:hidden;border-radius:8px;height:400px;display:flex;flex-direction:column">
    <div class="mtk-navlayout__shell">
      <span style="font-weight:700;font-size:15px;letter-spacing:-.3px">🌐 SAP Fiori</span>
      <div style="flex:1"></div>
      <span style="font-size:13px;opacity:.8">🔔 ⚙️ JD</span>
    </div>
    <div style="display:flex;flex:1;overflow:hidden">
      <nav class="mtk-navlayout__side">
        <a class="mtk-navlayout__item active" href="#">🏠 Home</a>
        <a class="mtk-navlayout__item" href="#">📊 Analytics</a>
        <a class="mtk-navlayout__item" href="#">📝 Reports</a>
        <a class="mtk-navlayout__item" href="#">👥 People</a>
        <a class="mtk-navlayout__item" href="#">⚙️ Settings</a>
      </nav>
      <main class="mtk-navlayout__main">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:8px">Dashboard</h2>
        <p style="font-size:13px;color:#6a6d75">Main content area — pages render here.</p>
      </main>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="NavigationLayout.js"></script>
</body>
</html>
