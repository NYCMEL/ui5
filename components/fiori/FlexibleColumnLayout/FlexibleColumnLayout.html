<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — FlexibleColumnLayout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="FlexibleColumnLayout.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">FlexibleColumnLayout</h1>
  <p class="demo-desc">A master-detail layout component with 1, 2, or 3 column configurations.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Column Layout</div>
  <div class="demo-block" style="padding:0;overflow:hidden;border-radius:8px">
    <div class="mtk-fcl-controls">
      <button class="mtk-btn mtk-btn--sm mtk-btn--default fcl-mode active" data-cols="1">1 Column</button>
      <button class="mtk-btn mtk-btn--sm mtk-btn--default fcl-mode" data-cols="2">2 Columns</button>
      <button class="mtk-btn mtk-btn--sm mtk-btn--default fcl-mode" data-cols="3">3 Columns</button>
    </div>
    <div class="mtk-fcl" id="fcl">
      <div class="mtk-fcl__col mtk-fcl__col--start">
        <div class="mtk-fcl__col-header">📋 Master List</div>
        <div style="padding:12px;font-size:13px;color:#3d4148">List of items to browse</div>
      </div>
      <div class="mtk-fcl__col mtk-fcl__col--mid" style="display:none">
        <div class="mtk-fcl__col-header">📄 Detail View</div>
        <div style="padding:12px;font-size:13px;color:#3d4148">Item details panel</div>
      </div>
      <div class="mtk-fcl__col mtk-fcl__col--end" style="display:none">
        <div class="mtk-fcl__col-header">✏️ Edit Panel</div>
        <div style="padding:12px;font-size:13px;color:#3d4148">Edit / form panel</div>
      </div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="FlexibleColumnLayout.js"></script>
</body>
</html>
