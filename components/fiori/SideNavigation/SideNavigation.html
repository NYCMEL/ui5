<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — SideNavigation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="SideNavigation.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">SideNavigation</h1>
  <p class="demo-desc">Provides a vertical navigation for enterprise applications with collapsible sections.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Side Navigation</div>
  <div class="demo-block" style="padding:0;overflow:hidden;border-radius:8px;display:flex;height:420px">
    <nav class="mtk-sidenav" id="sidenav">
      <div class="mtk-sidenav__toggle" id="sidenav-toggle" title="Collapse">◀</div>
      <div class="mtk-sidenav__items">
        <a class="mtk-sidenav__item active" href="#"><span class="sidenav-icon">🏠</span><span class="sidenav-text">Home</span></a>
        <div class="mtk-sidenav__group">
          <div class="mtk-sidenav__group-header">📂 <span class="sidenav-text">Documents</span></div>
          <a class="mtk-sidenav__item mtk-sidenav__item--sub" href="#"><span class="sidenav-icon">📄</span><span class="sidenav-text">My Documents</span></a>
          <a class="mtk-sidenav__item mtk-sidenav__item--sub" href="#"><span class="sidenav-icon">🔗</span><span class="sidenav-text">Shared</span></a>
        </div>
        <a class="mtk-sidenav__item" href="#"><span class="sidenav-icon">📊</span><span class="sidenav-text">Analytics</span></a>
        <a class="mtk-sidenav__item" href="#"><span class="sidenav-icon">⚙️</span><span class="sidenav-text">Settings</span></a>
        <a class="mtk-sidenav__item" href="#"><span class="sidenav-icon">👤</span><span class="sidenav-text">Profile</span></a>
      </div>
      <div class="mtk-sidenav__footer">
        <a class="mtk-sidenav__item" href="#"><span class="sidenav-icon">❓</span><span class="sidenav-text">Help</span></a>
      </div>
    </nav>
    <div style="flex:1;padding:24px;background:#f2f4f7;font-size:13px;color:#6a6d75">← Toggle sidebar with the arrow button</div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="SideNavigation.js"></script>
</body>
</html>
