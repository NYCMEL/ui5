<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — ShellBar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="ShellBar.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">ShellBar</h1>
  <p class="demo-desc">A header bar component providing a consistent look for enterprise applications. Contains logo, product name, search, and user actions.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Shell Bar</div>
  <div class="demo-block" style="padding:0;overflow:hidden;border-radius:8px">
    <div class="mtk-shellbar">
      <div class="mtk-shellbar__start">
        <button class="mtk-shellbar__menu-btn">☰</button>
        <div class="mtk-shellbar__logo">
          <span class="mtk-shellbar__logo-icon">🌐</span>
          <div>
            <div class="mtk-shellbar__product">SAP Fiori</div>
            <div class="mtk-shellbar__context">Enterprise Suite</div>
          </div>
        </div>
      </div>
      <div class="mtk-shellbar__search-wrap">
        <input type="text" class="mtk-shellbar__search" placeholder="🔍  Search…" />
      </div>
      <div class="mtk-shellbar__actions">
        <button class="mtk-shellbar__action" title="Notifications">🔔<span class="mtk-shellbar__badge">3</span></button>
        <button class="mtk-shellbar__action" title="Settings">⚙️</button>
        <button class="mtk-shellbar__action" title="Help">❓</button>
        <div class="mtk-shellbar__avatar">JD</div>
      </div>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="ShellBar.js"></script>
</body>
</html>
