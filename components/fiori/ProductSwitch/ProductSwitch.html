<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — ProductSwitch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="ProductSwitch.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">ProductSwitch</h1>
  <p class="demo-desc">Allows users to switch between SAP products or application tiles in a grid popover.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Product Switch</div>
  <div class="demo-block">
    <div class="mtk-pswitch-wrap">
      <button class="mtk-btn mtk-btn--default" id="open-pswitch">⊞ Products ▾</button>
      <div class="mtk-pswitch" id="pswitch">
        <div class="mtk-pswitch__header">SAP Products</div>
        <div class="mtk-pswitch__grid">
          <div class="mtk-pswitch__item active"><span class="mtk-pswitch__icon">📊</span><span class="mtk-pswitch__name">Analytics</span></div>
          <div class="mtk-pswitch__item"><span class="mtk-pswitch__icon">💼</span><span class="mtk-pswitch__name">Sales Cloud</span></div>
          <div class="mtk-pswitch__item"><span class="mtk-pswitch__icon">🛒</span><span class="mtk-pswitch__name">Commerce</span></div>
          <div class="mtk-pswitch__item"><span class="mtk-pswitch__icon">👥</span><span class="mtk-pswitch__name">HR Suite</span></div>
          <div class="mtk-pswitch__item"><span class="mtk-pswitch__icon">🏭</span><span class="mtk-pswitch__name">Manufacturing</span></div>
          <div class="mtk-pswitch__item"><span class="mtk-pswitch__icon">🔗</span><span class="mtk-pswitch__name">Integration</span></div>
        </div>
      </div>
    </div>
    <div class="text-sm text-muted mt-8" id="pswitch-state">Active: Analytics</div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="ProductSwitch.js"></script>
</body>
</html>
