<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — Tokenizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Tokenizer.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Tokenizer</h1>
  <p class="demo-desc">A container for Token components that manages overflow and displays tokens in a row.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Tokenizer</div>
  <div class="demo-block">
    <div class="mtk-tokenizer">
      <span class="mtk-token">React<button class="mtk-token__remove">×</button></span>
      <span class="mtk-token">TypeScript<button class="mtk-token__remove">×</button></span>
      <span class="mtk-token">SCSS<button class="mtk-token__remove">×</button></span>
      <span class="mtk-token">Node.js<button class="mtk-token__remove">×</button></span>
      <span class="mtk-token">GraphQL<button class="mtk-token__remove">×</button></span>
      <span class="mtk-tokenizer__overflow" id="tok-overflow" style="display:none"></span>
    </div>
    <div class="mtk-tokenizer-actions">
      <button class="mtk-btn mtk-btn--transparent mtk-btn--sm" id="add-token">+ Add Token</button>
    </div>
  </div>
</div>
</div>
<script src="../../shared/base.js"></script>
<script src="Tokenizer.js"></script>
</body>
</html>
