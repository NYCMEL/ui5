<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — Label</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Label.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Label</h1>
  <p class="demo-desc">A label component for form elements with required indicator and colon support.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Label Variants</div>
  <div class="demo-block">
    <div class="demo-row" style="flex-direction:column;align-items:flex-start;gap:16px">
      <label class="mtk-label">Standard Label</label>
      <label class="mtk-label mtk-label--required">Required Label</label>
      <label class="mtk-label mtk-label--colon">Label with Colon</label>
      <label class="mtk-label mtk-label--required mtk-label--colon">Required with Colon</label>
      <label class="mtk-label" style="color:#6a6d75">Muted / Secondary Label</label>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Label.js"></script>
</body>
</html>
