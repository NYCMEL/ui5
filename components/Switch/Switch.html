<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Switch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Switch.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Switch</h1>
  <p class="demo-desc">Used for changing between binary states with a slide animation.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Switch States</div>
  <div class="demo-block">
    <div class="demo-row">
      <label class="ui5-switch"><input type="checkbox" checked /><span class="ui5-switch__track"></span><span class="ui5-switch__label">On</span></label>
      <label class="ui5-switch"><input type="checkbox" /><span class="ui5-switch__track"></span><span class="ui5-switch__label">Off</span></label>
      <label class="ui5-switch" style="opacity:0.4"><input type="checkbox" disabled checked /><span class="ui5-switch__track"></span><span class="ui5-switch__label">Disabled On</span></label>
      <label class="ui5-switch" style="opacity:0.4"><input type="checkbox" disabled /><span class="ui5-switch__track"></span><span class="ui5-switch__label">Disabled Off</span></label>
    </div>
    <div class="text-sm text-muted mt-8 switch-state"></div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Switch.js"></script>
</body>
</html>
