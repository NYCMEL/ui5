<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — Toast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Toast.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Toast</h1>
  <p class="demo-desc">A small non-disruptive popup for success, info, warning, or error messages.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Toast Triggers</div>
  <div class="demo-block">
    <div class="demo-row">
      <button class="ui5-btn ui5-btn--default" onclick="showToast('Information message displayed.')">ℹ Info</button>
      <button class="ui5-btn ui5-btn--positive" onclick="showToast('Changes saved successfully!', 'success')">✅ Success</button>
      <button class="ui5-btn ui5-btn--attention" onclick="showToast('Please review before proceeding.', 'warning')">⚠️ Warning</button>
      <button class="ui5-btn ui5-btn--negative" onclick="showToast('An error occurred. Please retry.', 'error')">❌ Error</button>
    </div>
  </div>
</div>
<div id="toast-container" class="ui5-toast-container"></div>
</div>

<script src="../../shared/base.js"></script>
<script src="Toast.js"></script>
</body>
</html>
