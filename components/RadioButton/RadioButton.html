<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — RadioButton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="RadioButton.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">RadioButton</h1>
  <p class="demo-desc">Enables users to select a single option from a set of options.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Radio Group</div>
  <div class="demo-block">
    <div class="radio-group demo-row">
      <label class="ui5-radio"><input type="radio" name="r1" value="Option A" checked /><span class="ui5-radio__dot"></span>Option A</label>
      <label class="ui5-radio"><input type="radio" name="r1" value="Option B" /><span class="ui5-radio__dot"></span>Option B</label>
      <label class="ui5-radio"><input type="radio" name="r1" value="Option C" /><span class="ui5-radio__dot"></span>Option C</label>
      <label class="ui5-radio" style="opacity:0.4"><input type="radio" name="r1" disabled /><span class="ui5-radio__dot"></span>Disabled</label>
    </div>
    <div class="text-sm text-muted mt-8 radio-state">Selected: Option A</div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="RadioButton.js"></script>
</body>
</html>
