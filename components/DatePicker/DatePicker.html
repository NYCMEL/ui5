<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI5 — DatePicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="DatePicker.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">DatePicker</h1>
  <p class="demo-desc">Input field with assigned calendar for selecting dates, date ranges, and date-times.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Date Variants</div>
  <div class="demo-block">
    <div class="demo-row" style="flex-wrap:wrap;gap:20px">
      <div class="ui5-input-wrap">
        <label class="ui5-label">Date</label>
        <div class="ui5-date-input"><input type="date" class="ui5-date-field" /></div>
      </div>
      <div class="ui5-input-wrap">
        <label class="ui5-label">Date &amp; Time</label>
        <div class="ui5-date-input"><input type="datetime-local" class="ui5-date-field" /></div>
      </div>
      <div class="ui5-input-wrap">
        <label class="ui5-label">Date Range</label>
        <div class="ui5-date-input" style="gap:8px">
          <input type="date" class="ui5-date-field" />
          <span style="color:#6a6d75;font-size:12px">–</span>
          <input type="date" class="ui5-date-field" />
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="DatePicker.js"></script>
</body>
</html>
