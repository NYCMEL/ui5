<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — Button</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Button.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Button</h1>
  <p class="demo-desc">Allows users to trigger actions. Available in multiple design types and sizes.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Design Types</div>
  <div class="demo-block">
    <div class="demo-row">
      <button class="mtk-btn mtk-btn--default">Default</button>
      <button class="mtk-btn mtk-btn--emphasized">Emphasized</button>
      <button class="mtk-btn mtk-btn--positive">Positive</button>
      <button class="mtk-btn mtk-btn--negative">Negative</button>
      <button class="mtk-btn mtk-btn--transparent">Transparent</button>
      <button class="mtk-btn mtk-btn--ghost">Ghost</button>
      <button class="mtk-btn mtk-btn--attention">Attention</button>
    </div>
  </div>
</div>
<div class="demo-section">
  <div class="demo-section__label">Sizes</div>
  <div class="demo-block">
    <div class="demo-row" style="align-items:center">
      <button class="mtk-btn mtk-btn--emphasized mtk-btn--sm">Small</button>
      <button class="mtk-btn mtk-btn--emphasized">Medium</button>
      <button class="mtk-btn mtk-btn--emphasized mtk-btn--lg">Large</button>
    </div>
  </div>
</div>
<div class="demo-section">
  <div class="demo-section__label">With Icons</div>
  <div class="demo-block">
    <div class="demo-row">
      <button class="mtk-btn mtk-btn--emphasized">⬇️ Download</button>
      <button class="mtk-btn mtk-btn--default">⚙️ Settings</button>
      <button class="mtk-btn mtk-btn--positive">✓ Approve</button>
      <button class="mtk-btn mtk-btn--negative">🗑️ Delete</button>
    </div>
  </div>
</div>
<div class="demo-section">
  <div class="demo-section__label">Disabled State</div>
  <div class="demo-block">
    <div class="demo-row">
      <button class="mtk-btn mtk-btn--default" disabled>Default</button>
      <button class="mtk-btn mtk-btn--emphasized" disabled>Emphasized</button>
      <button class="mtk-btn mtk-btn--positive" disabled>Positive</button>
      <button class="mtk-btn mtk-btn--negative" disabled>Negative</button>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Button.js"></script>
</body>
</html>
