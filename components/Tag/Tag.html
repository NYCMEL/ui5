<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — Tag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Tag.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Tag</h1>
  <p class="demo-desc">Small items of information used to visualize selected items, categories or states.</p>
  
<div class="demo-section">
  <div class="demo-section__label">Tag Variants</div>
  <div class="demo-block">
    <div class="demo-row">
      <span class="mtk-tag mtk-tag--default">Default</span>
      <span class="mtk-tag mtk-tag--set1">Set 1</span>
      <span class="mtk-tag mtk-tag--set2">Set 2</span>
      <span class="mtk-tag mtk-tag--set3">Set 3</span>
      <span class="mtk-tag mtk-tag--set4">Set 4</span>
      <span class="mtk-tag mtk-tag--positive">✓ Positive</span>
      <span class="mtk-tag mtk-tag--negative">✕ Negative</span>
      <span class="mtk-tag mtk-tag--critical">⚠ Critical</span>
      <span class="mtk-tag mtk-tag--neutral">— Neutral</span>
    </div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Tag.js"></script>
</body>
</html>
