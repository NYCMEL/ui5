<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK — Tree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/_base.css" />
  <link rel="stylesheet" href="Tree.css" />
</head>
<body>
<div class="demo-wrap">
  <h1 class="demo-title">Tree</h1>
  <p class="demo-desc">A tree component for displaying hierarchical data with expandable nodes.</p>
  
<div class="demo-section">
  <div class="demo-section__label">File Tree</div>
  <div class="demo-block">
    <div class="mtk-tree" style="max-width:360px">
      <div class="mtk-tree__item expanded"><span class="mtk-tree__toggle">▶</span><span class="mtk-tree__icon">📁</span><span class="mtk-tree__label">src</span></div>
      <div class="mtk-tree__children">
        <div class="mtk-tree__item expanded"><span class="mtk-tree__toggle">▶</span><span class="mtk-tree__icon">📁</span><span class="mtk-tree__label">components</span></div>
        <div class="mtk-tree__children">
          <div class="mtk-tree__item"><span class="mtk-tree__toggle invisible"></span><span class="mtk-tree__icon">📄</span><span class="mtk-tree__label">Button.jsx</span></div>
          <div class="mtk-tree__item"><span class="mtk-tree__toggle invisible"></span><span class="mtk-tree__icon">📄</span><span class="mtk-tree__label">Input.jsx</span></div>
          <div class="mtk-tree__item"><span class="mtk-tree__toggle invisible"></span><span class="mtk-tree__icon">📄</span><span class="mtk-tree__label">Card.jsx</span></div>
        </div>
        <div class="mtk-tree__item"><span class="mtk-tree__toggle invisible"></span><span class="mtk-tree__icon">📄</span><span class="mtk-tree__label">App.jsx</span></div>
        <div class="mtk-tree__item"><span class="mtk-tree__toggle invisible"></span><span class="mtk-tree__icon">📄</span><span class="mtk-tree__label">index.js</span></div>
      </div>
      <div class="mtk-tree__item"><span class="mtk-tree__toggle">▶</span><span class="mtk-tree__icon">📁</span><span class="mtk-tree__label">public</span></div>
      <div class="mtk-tree__children">
        <div class="mtk-tree__item"><span class="mtk-tree__toggle invisible"></span><span class="mtk-tree__icon">📄</span><span class="mtk-tree__label">index.html</span></div>
      </div>
      <div class="mtk-tree__item"><span class="mtk-tree__toggle invisible"></span><span class="mtk-tree__icon">⚙️</span><span class="mtk-tree__label">package.json</span></div>
    </div>
    <div class="text-sm text-muted mt-8 tree-state"></div>
  </div>
</div>
</div>

<script src="../../shared/base.js"></script>
<script src="Tree.js"></script>
</body>
</html>
